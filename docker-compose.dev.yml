services:
  server:
    build:
      context: ./apps/server
    env_file:
      - .env
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${SERVER_PORT}
      CLIENT_PORT: ${CLIENT_PORT}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Fleet Command}
      APP_URL: ${APP_URL}
      NODE_ENV: development
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    command: >
      sh -c "set -e;
      npm ci --include=dev;
      npm run build;
      npm run start"
