name: Deploy Fleet Command (prod)

on:
    push:
        branches:
            - main

concurrency:
    group: fleet-command-prod
    cancel-in-progress: true

jobs:
    deploy-fleet-command-prod:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Validate required secrets
              run: |
                  [ -n "${{ secrets.PROD_EC2_SSH_HOST_FLEET }}" ] || (echo "Missing PROD_EC2_SSH_HOST_FLEET" && exit 1)
                  [ -n "${{ secrets.EC2_SSH_PRIVATE_KEY_FLEET }}" ] || (echo "Missing EC2_SSH_PRIVATE_KEY_FLEET" && exit 1)
                  [ -n "${{ secrets.FLEET_PROD_DB_USER }}" ] || (echo "Missing FLEET_PROD_DB_USER" && exit 1)
                  [ -n "${{ secrets.FLEET_PROD_DB_PASSWORD }}" ] || (echo "Missing FLEET_PROD_DB_PASSWORD" && exit 1)
                  [ -n "${{ secrets.FLEET_PROD_DB_NAME }}" ] || (echo "Missing FLEET_PROD_DB_NAME" && exit 1)
                  [ -n "${{ secrets.FLEET_PROD_DB_HOST }}" ] || (echo "Missing FLEET_PROD_DB_HOST" && exit 1)
                  [ -n "${{ secrets.FLEET_PROD_VITE_API_BASE_URL }}" ] || (echo "Missing FLEET_PROD_VITE_API_BASE_URL" && exit 1)
                  [ -n "${{ secrets.FLEET_PROD_S3_BUCKET }}" ] || (echo "Missing FLEET_PROD_S3_BUCKET" && exit 1)
                  [ -n "${{ secrets.FLEET_PROD_CLOUDFRONT_DISTRIBUTION_ID }}" ] || (echo "Missing FLEET_PROD_CLOUDFRONT_DISTRIBUTION_ID" && exit 1)
                  [ -n "${{ secrets.AWS_S3_ACCESS_KEY_ID }}" ] || (echo "Missing AWS_S3_ACCESS_KEY_ID" && exit 1)
                  [ -n "${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}" ] || (echo "Missing AWS_S3_SECRET_ACCESS_KEY" && exit 1)
                  [ -n "${{ secrets.SENDGRID_API_KEY }}" ] || (echo "Missing SENDGRID_API_KEY" && exit 1)
                  [ -n "${{ secrets.FLEET_FROM_EMAIL }}" ] || (echo "Missing FLEET_FROM_EMAIL" && exit 1)
                  [ -n "${{ secrets.FLEET_PROD_APP_URL }}" ] || (echo "Missing FLEET_PROD_APP_URL" && exit 1)

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  printf "%s" "${{ secrets.EC2_SSH_PRIVATE_KEY_FLEET }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H "${{ secrets.PROD_EC2_SSH_HOST_FLEET }}" >> ~/.ssh/known_hosts

            - name: Test SSH connection
              run: ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.PROD_EC2_SSH_HOST_FLEET }} "echo Connected"

            - name: Ensure Docker, Buildx, and Compose are installed on EC2
              run: |
                  ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.PROD_EC2_SSH_HOST_FLEET }} 'bash -s' << 'SSH'
                  set -e

                  command -v docker >/dev/null 2>&1 || { echo "❌ Docker missing"; exit 1; }
                  docker --version

                  ARCH=$(uname -m)
                  COMPOSE_BIN="docker-compose-linux-x86_64"
                  BUILDX_ARCH="amd64"

                  if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
                    COMPOSE_BIN="docker-compose-linux-aarch64"
                    BUILDX_ARCH="arm64"
                  fi

                  sudo mkdir -p /usr/local/lib/docker/cli-plugins

                  echo "Installing/Updating compose plugin..."
                  sudo curl -fSL "https://github.com/docker/compose/releases/latest/download/${COMPOSE_BIN}" \
                    -o /usr/local/lib/docker/cli-plugins/docker-compose
                  sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

                  echo "Installing/Updating buildx plugin..."
                  BUILDX_VERSION=$(curl -fsSL https://api.github.com/repos/docker/buildx/releases/latest | grep -m1 '"tag_name":' | cut -d '"' -f4)
                  BUILDX_URL="https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-${BUILDX_ARCH}"
                  sudo curl -fSL "$BUILDX_URL" -o /usr/local/lib/docker/cli-plugins/docker-buildx
                  sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx

                  SIZE=$(sudo wc -c < /usr/local/lib/docker/cli-plugins/docker-buildx | tr -d ' ')
                  if [ "$SIZE" -lt 1000000 ]; then
                    echo "❌ buildx binary too small ($SIZE bytes)"; exit 1
                  fi

                  echo "✅ compose:" && docker compose version
                  echo "✅ buildx:" && docker buildx version
                  SSH

            - name: Rsync repository to EC2
              run: |
                  rsync -e "ssh -o StrictHostKeyChecking=no" -avz \
                    --exclude ".git" \
                    --exclude "node_modules" \
                    --exclude ".env" \
                    ./ ec2-user@${{ secrets.PROD_EC2_SSH_HOST_FLEET }}:~/fleet-command/

            - name: Write environment file (.env) on EC2
              run: |
                  ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.PROD_EC2_SSH_HOST_FLEET }} "bash -lc '
                  set -e
                  cd ~/fleet-command

                  cat > .env <<\"ENV\"
                  NODE_ENV=production

                  DB_USER="${{ secrets.FLEET_PROD_DB_USER }}"
                  DB_PASSWORD="${{ secrets.FLEET_PROD_DB_PASSWORD }}"
                  DB_NAME="${{ secrets.FLEET_PROD_DB_NAME }}"
                  DB_HOST="${{ secrets.FLEET_PROD_DB_HOST }}"
                  DB_PORT=5432
                  DATABASE_URL="postgresql://${{ secrets.FLEET_PROD_DB_USER }}:${{ secrets.FLEET_PROD_DB_PASSWORD }}@${{ secrets.FLEET_PROD_DB_HOST }}:5432/${{ secrets.FLEET_PROD_DB_NAME }}"

                  SERVER_PORT=5001
                  CLIENT_PORT=8080
                  APP_URL="${{ secrets.FLEET_PROD_APP_URL }}"

                  VITE_API_BASE_URL="${{ secrets.FLEET_PROD_VITE_API_BASE_URL }}"
                  VITE_APP_URL="${{ secrets.FLEET_PROD_APP_URL }}"

                  SENDGRID_API_KEY="${{ secrets.SENDGRID_API_KEY }}"
                  SENDGRID_FROM_EMAIL="${{ secrets.FLEET_FROM_EMAIL }}"
                  SENDGRID_FROM_NAME="Fleet Command"
                  SERVER_PUBLIC_URL="${{ secrets.FLEET_PROD_VITE_API_BASE_URL }}"

                  S3_IMAGE_BUCKET="prod-fleet-command-images"
                  S3_FILES_BUCKET="prod-fleet-command-files"
                  S3_IMAGE_PUBLIC_BASE_URL="${{ secrets.FLEET_PROD_APP_URL }}"
                  S3_FILES_PUBLIC_BASE_URL="${{ secrets.FLEET_PROD_APP_URL }}"

                  ENV
                  '"

            - name: Docker sanity check
              run: |
                  ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.PROD_EC2_SSH_HOST_FLEET }} 'bash -s' << 'SSH'
                  set -e
                  command -v docker >/dev/null 2>&1 || { echo "Docker missing"; exit 1; }
                  echo "✅ Docker OK" && docker --version
                  echo "✅ Docker Compose OK" && docker compose version
                  cd ~/fleet-command
                  echo "✅ Directory OK: $(pwd)"
                  ls -la | head -n 20
                  SSH

            - name: Ensure Docker daemon is running
              run: |
                  ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.PROD_EC2_SSH_HOST_FLEET }} "bash -lc '
                  set -e
                  sudo systemctl enable docker
                  sudo systemctl start docker
                  sudo systemctl status docker --no-pager
                  sudo docker ps
                  '"

            - name: Docker compose deploy
              run: |
                  ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.PROD_EC2_SSH_HOST_FLEET }} "bash -lc '
                  set -e
                  cd ~/fleet-command

                  sudo docker compose -f docker-compose.prod.yml down || true
                  sudo docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
                  sudo docker compose -f docker-compose.prod.yml ps
                  '"

            - name: Run database migrations
              run: |
                  ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.PROD_EC2_SSH_HOST_FLEET }} "bash -lc '
                  set -e
                  cd ~/fleet-command
                  node createTables.js
                  '"

            - name: Show container logs
              if: always()
              run: |
                  ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.PROD_EC2_SSH_HOST_FLEET }} "bash -lc '
                  set +e
                  cd ~/fleet-command
                  echo \"---- SERVER LOGS ----\"
                  sudo docker compose -f docker-compose.prod.yml logs --tail=100 server || true
                  '"

            # ── Frontend: build → S3 → CloudFront ──────────────────────────
            - name: Build frontend (Vite)
              env:
                  VITE_API_BASE_URL: ${{ secrets.FLEET_PROD_VITE_API_BASE_URL }}
                  VITE_APP_URL: ${{ secrets.FLEET_PROD_APP_URL }}
              run: |
                  cd apps/client
                  npm install
                  npm run build

            - name: Verify VITE_API_BASE_URL baked into build
              run: |
                  grep -R "${{ secrets.FLEET_PROD_VITE_API_BASE_URL }}" -n apps/client/dist || true

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
                  aws-region: us-east-2
                  aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}

            - name: Upload frontend to S3
              run: |
                  aws s3 sync apps/client/dist s3://${{ secrets.FLEET_PROD_S3_BUCKET }} --delete

            - name: CloudFront invalidation
              run: |
                  if [ -n "${{ secrets.FLEET_PROD_CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
                    aws cloudfront create-invalidation \
                      --distribution-id "${{ secrets.FLEET_PROD_CLOUDFRONT_DISTRIBUTION_ID }}" \
                      --paths "/*"
                  else
                    echo "No CloudFront distribution ID set. Skipping."
                  fi
