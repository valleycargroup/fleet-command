<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fleet Command — Full Test Plan</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D0D1A;color:#E5E7EB;min-height:100vh;padding:24px}
  h1{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px}
  .subtitle{font-size:13px;color:#4B5563;margin-bottom:24px}
  .progress-bar-wrap{background:#1A1A2E;border-radius:8px;height:10px;margin-bottom:8px;overflow:hidden}
  .progress-bar{height:10px;border-radius:8px;background:linear-gradient(90deg,#10B981,#34D399);transition:width .4s}
  .progress-label{font-size:12px;color:#6B7280;margin-bottom:24px;display:flex;justify-content:space-between}
  .section{margin-bottom:28px}
  .section-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#12122A;border:1px solid #2A2A3E;border-radius:8px 8px 0 0;cursor:pointer;user-select:none}
  .section-header:hover{background:#1A1A2E}
  .section-title{font-size:13px;font-weight:700;color:#E5E7EB;letter-spacing:.5px;text-transform:uppercase;flex:1}
  .section-stats{font-size:12px;color:#4B5563}
  .section-chevron{font-size:12px;color:#4B5563;transition:transform .2s}
  .section.collapsed .section-chevron{transform:rotate(-90deg)}
  .section.collapsed .tests{display:none}
  .tests{border:1px solid #2A2A3E;border-top:none;border-radius:0 0 8px 8px;overflow:hidden}
  .test-row{display:grid;grid-template-columns:32px 1fr auto;align-items:start;padding:10px 14px;border-bottom:1px solid #1A1A2E;gap:10px;transition:background .15s;border-left:4px solid transparent}
  .test-row:last-child{border-bottom:none}
  .test-row:not(.pass):not(.fail):not(.skip):not(.pending):not(.resolved):hover{background:#111122}
  .test-row.pass{background:#07180F;border-left-color:#22C55E}
  .test-row.fail{background:#1C0707;border-left-color:#EF4444}
  .test-row.skip{background:#18180A;border-left-color:#EAB308}
  .test-row.pending{background:#1C1108;border-left-color:#F97316}
  .test-row.resolved{background:#071428;border-left-color:#3B82F6}
  .test-num{font-size:11px;color:#2A2A4E;font-weight:700;padding-top:2px;text-align:center}
  .test-row.pass .test-num{color:#22C55E}
  .test-row.fail .test-num{color:#EF4444}
  .test-row.skip .test-num{color:#EAB308}
  .test-row.pending .test-num{color:#F97316}
  .test-row.resolved .test-num{color:#3B82F6}
  .test-body{display:flex;flex-direction:column;gap:4px}
  .test-case{font-size:13px;color:#4B5563;line-height:1.4}
  .test-row.pass .test-case,.test-row.fail .test-case,.test-row.skip .test-case,.test-row.pending .test-case,.test-row.resolved .test-case{color:#D1D5DB}
  .test-expected{font-size:11.5px;color:#9CA3AF;line-height:1.5;margin-top:4px;padding:4px 8px 4px 10px;border-left:2px solid #065F46;border-radius:0 4px 4px 0;background:#06110D}
  .exp-label{color:#34D399;font-weight:800;font-size:10px;letter-spacing:.5px;text-transform:uppercase;margin-right:6px}
  .test-notes{margin-top:6px;width:100%;background:#0D0D1A;border:1px solid #2A2A3E;border-radius:4px;color:#9CA3AF;font-size:12px;padding:5px 8px;resize:none;font-family:inherit;display:none}
  .test-notes:focus{outline:none;border-color:#3B82F6}
  .test-notes.visible{display:block}
  .actions{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
  .btn-group{display:flex;gap:4px}
  .btn{border:none;border-radius:4px;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;transition:all .15s;letter-spacing:.3px}
  .btn-pass{background:#064E3B;color:#34D399}.btn-pass:hover,.btn-pass.active{background:#10B981;color:#fff}
  .btn-fail{background:#450A0A;color:#F87171}.btn-fail:hover,.btn-fail.active{background:#EF4444;color:#fff}
  .btn-skip{background:#1C1C0A;color:#CA8A04}.btn-skip:hover,.btn-skip.active{background:#EAB308;color:#000}
  .btn-pending{background:#3B1F0A;color:#FB923C}.btn-pending:hover,.btn-pending.active{background:#F97316;color:#fff}
  .btn-resolved{background:#0A1A30;color:#60A5FA}.btn-resolved:hover,.btn-resolved.active{background:#3B82F6;color:#fff}
  .btn-note{background:transparent;border:1px solid #2A2A3E;color:#4B5563;font-size:10px;padding:3px 7px}.btn-note:hover{border-color:#4B5563;color:#9CA3AF}
  .btn-note.active{border-color:#3B82F6;color:#60A5FA}
  .status-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.5px}
  .badge-pass{background:#064E3B;color:#34D399}
  .badge-fail{background:#450A0A;color:#F87171}
  .badge-skip{background:#1C1C0A;color:#EAB308}
  .toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
  .toolbar-btn{background:#12122A;border:1px solid #2A2A3E;color:#9CA3AF;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:600}
  .toolbar-btn:hover{border-color:#4B5563;color:#E5E7EB}
  .toolbar-btn.green{border-color:#166534;color:#34D399}.toolbar-btn.green:hover{background:#064E3B}
  .toolbar-btn.blue{border-color:#1E3A5F;color:#60A5FA}.toolbar-btn.blue:hover{background:#0F2940}
  .saved-tag{font-size:11px;color:#374151;margin-left:auto}
  .meta-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;padding:10px 14px;background:#12122A;border:1px solid #2A2A3E;border-radius:8px;flex-wrap:wrap}
  .meta-bar label{font-size:12px;color:#6B7280;display:flex;align-items:center;gap:6px}
  .meta-bar input{background:#0D0D1A;border:1px solid #2A2A3E;border-radius:4px;color:#E5E7EB;font-size:12px;padding:4px 8px;outline:none;width:160px}
  .meta-bar input:focus{border-color:#3B82F6}
  .import-hint{font-size:11px;color:#374151;font-style:italic}
  .folder-strip{font-size:11px;color:#4B5563;padding:6px 14px;background:#0D0D1A;border:1px solid #1A1A2E;border-radius:6px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .folder-strip span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .folder-strip a{color:#3B82F6;cursor:pointer;font-weight:600;text-decoration:none;flex-shrink:0}
  .folder-strip a:hover{text-decoration:underline}
  /* Group divider */
  .group-divider{margin:36px 0 20px;padding:12px 16px;background:#0D0D1A;border-left:3px solid #F97316;border-radius:0 6px 6px 0}
  .group-divider .gd-label{font-size:14px;font-weight:800;color:#F97316;letter-spacing:.5px;text-transform:uppercase}
  .group-divider .gd-sub{font-size:11px;color:#6B7280;margin-top:3px;font-family:monospace}
  /* Section change tags */
  .section-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;letter-spacing:.5px;flex-shrink:0;text-transform:uppercase}
  .tag-new{background:#1A2940;color:#60A5FA;border:1px solid #1E3A5F}
  .tag-updated{background:#3B2F10;color:#FBBF24;border:1px solid #78590A}
  .tag-fixed{background:#0A1F12;color:#34D399;border:1px solid #166534}
  .section-tag{cursor:pointer;transition:opacity .15s}.section-tag:hover{opacity:.7}
  .tag-add{opacity:0;color:#374151;border:1px dashed #2A2A3E;background:transparent;cursor:pointer;transition:opacity .15s}
  .section-header:hover .tag-add{opacity:1}
  .section-done>.section-header{border-color:#166534!important;background:#071A0F}
  .section-fail>.section-header{border-color:#7F1D1D!important;background:#1A0707}
  .done-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;background:#064E3B;color:#34D399;letter-spacing:.5px}
  .fail-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;background:#450A0A;color:#F87171;letter-spacing:.5px}
  .veh-chip{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;background:#1A2040;color:#818CF8;border:1px solid #312E81;letter-spacing:.3px;margin-right:6px;font-family:monospace;vertical-align:middle;white-space:nowrap}
  .role-chip{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;letter-spacing:.3px;margin-right:5px;font-family:system-ui,sans-serif;vertical-align:middle;white-space:nowrap}
  @media print{
    body{background:#fff;color:#000;padding:12px}
    .toolbar,.btn,.test-notes,.actions{display:none!important}
    .section-header{background:#f3f4f6;border-color:#d1d5db}
    .section-title{color:#111}
    .tests{border-color:#d1d5db}
    .test-row{border-color:#e5e7eb}
    .test-case{color:#111}
    .test-expected{color:#374151;background:#f0fdf4;border-left-color:#16a34a}
    .exp-label{color:#15803d}
    .test-num{color:#9ca3af}
    .test-row.pass{background:#f0fdf4}
    .test-row.fail{background:#fef2f2}
    .test-row.skip{background:#fefce8}
    .progress-bar-wrap{background:#e5e7eb}
    h1,.subtitle,.progress-label{color:#111}
    .group-divider{background:#fff7ed;border-left-color:#f97316}
    .group-divider .gd-label{color:#c2410c}
    .group-divider .gd-sub{color:#6b7280}
    .section-tag{border:1px solid #ccc}
    .tag-new{background:#dbeafe;color:#1d4ed8}
    .tag-updated{background:#fef3c7;color:#92400e}
    .tag-fixed{background:#dcfce7;color:#166534}
  }
</style>
</head>
<body>

<h1>Fleet Command — Full Test Plan</h1>
<div class="subtitle">All features · Phase enhancements highlighted · Results auto-save to browser storage on every click · Set an output folder to also auto-save to disk after each change.</div>

<div class="meta-bar">
  <label>Tester <input id="meta-tester" placeholder="Your name" oninput="saveMeta()"></label>
  <label>Branch <input id="meta-branch" placeholder="e.g. feature/fleet-enhancements" oninput="saveMeta()"></label>
  <label>Date <input id="meta-date" type="date" oninput="saveMeta()"></label>
</div>

<div class="toolbar">
  <button class="toolbar-btn" onclick="expandAll()">Expand All</button>
  <button class="toolbar-btn" onclick="collapseAll()">Collapse All</button>
  <button class="toolbar-btn" onclick="resetAll()">Reset All</button>
  <button class="toolbar-btn" onclick="window.print()">🖨 Print / PDF</button>
  <button class="toolbar-btn green" onclick="exportResults()">⬇ Export Results</button>
  <button class="toolbar-btn" onclick="pickFolder()" id="folder-btn">📁 Set Output Folder</button>
  <button class="toolbar-btn blue" onclick="document.getElementById('import-input').click()">⬆ Import Results</button>
  <input id="import-input" type="file" accept=".json" style="display:none" onchange="importResults(event)">
  <span class="saved-tag" id="saved-tag">—</span>
</div>
<div class="folder-strip" id="folder-strip" style="display:none">
  📁 Output folder: <span id="folder-name"></span>
  <a onclick="pickFolder()">Change</a>
</div>

<div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
<div class="progress-label">
  <span id="progress-text">0 reviewed</span>
  <span id="progress-pct">0%</span>
</div>

<div id="plan"></div>

<script>
const ROLE_COLORS = {
  'Admin':    { color:'#FBBF24', bg:'#1C1500', border:'#78400A' },
  'Buyer':    { color:'#60A5FA', bg:'#0C1828', border:'#1E3A5F' },
  'Seller':   { color:'#34D399', bg:'#051810', border:'#065F46' },
  'AP':       { color:'#F59E0B', bg:'#1C1000', border:'#92400E' },
  'TechSupp': { color:'#A78BFA', bg:'#140D2A', border:'#4C1D95' },
  'Vendor A': { color:'#FB923C', bg:'#1C0D00', border:'#7C2D12' },
  'Vendor B': { color:'#FDBA74', bg:'#1A1000', border:'#92400E' },
  'Vendor C': { color:'#86EFAC', bg:'#061A0C', border:'#14532D' },
  'Buy+Sell': { color:'#22D3EE', bg:'#081E28', border:'#164E63' },
  'Any':      { color:'#9CA3AF', bg:'#1A1A2E', border:'#374151' },
};
function roleChip(role) {
  if (!role) return '';
  const c = ROLE_COLORS[role] || { color:'#9CA3AF', bg:'#1A1A2E', border:'#374151' };
  return '<span class="role-chip" title="Log in as: ' + role + '" style="background:' + c.bg + ';color:' + c.color + ';border:1px solid ' + c.border + '">👤 ' + role + '</span>';
}

const GROUPS = [
  {
    label: null,
    sections: [
      {
        title: "1. Login & Authentication",
        tests: [
          { case: "Enter valid email and password (michael.alanw@gmail.com / password123)", expected: "Login succeeds — fleet list loads with all active vehicles", role: "Admin" },
          { case: "Enter valid email with wrong password", expected: "Error message displayed; user stays on login screen", role: "Any" },
          { case: "Refresh the browser tab after login", expected: "Session is restored from localStorage — user stays logged in without re-entering credentials", role: "Any" },
          { case: "Click Logout button", expected: "Session is cleared and the login screen is shown", role: "Any" },
          { case: "Simulate idle for 12+ hours (or advance the idle timer in console)", expected: "Auto-logout alert fires and session is cleared", role: "Any" },
        ]
      },
      {
        title: "2. Fleet List, Search & Filters",
        tests: [
          { case: "Login as admin → check the fleet list", expected: "7 active vehicles display (PHX-001 through PHX-006 + DFW-001 + DFW-002) with VIN, year, make, model, and location columns", role: "Admin" },
          { case: "Type 'FORD' in the search box", expected: "List filters to PHX-001 (Ford F-150) only", vehicle: "PHX-001", role: "Admin" },
          { case: "Clear the search input", expected: "All active vehicles return to the list", role: "Admin" },
          { case: "Select 'PHX' from the location filter", expected: "Only Phoenix vehicles are shown (PHX-001 through PHX-006)", role: "Admin" },
          { case: "Select 'Dallas' from the location filter", expected: "Only Dallas vehicles are shown", vehicle: "DFW-001 · DFW-002", role: "Admin" },
          { case: "Click the Delivered tab", expected: "PHX-004 appears; tab badge shows correct count", vehicle: "PHX-004", role: "Admin" },
        ]
      },
      {
        title: "3. Add & Edit Vehicles",
        tests: [
          { case: "Click + Add Vehicle button", expected: "Modal opens with VIN, year, make, model, color, mileage, and location fields", role: "Admin" },
          { case: "Fill required fields and save", expected: "Vehicle appears in the active fleet list with correct data", role: "Admin" },
          { case: "Open an existing vehicle and edit mileage and color, then save", expected: "Changes reflect immediately and persist after page refresh", vehicle: "PHX-001", role: "Admin" },
          { case: "Delete a vehicle via the confirmation dialog", expected: "Vehicle is removed from the list and no longer searchable", vehicle: "PHX-006", role: "Admin" },
          { case: "CSV Upload — select a valid vehicle CSV file", expected: "Success toast shows imported and updated counts; new vehicles appear in the list", role: "Admin" },
        ]
      },
      {
        title: "4. Recon Workflow — Categories & Tasks",
        tests: [
          { case: "Open an active vehicle → check recon section", expected: "All recon category cards visible; detail=assigned, bodyshop=bid submitted, touchup=approved, pdr=started, interior=complete", vehicle: "PHX-002", role: "Admin" },
          { case: "Toggle the 'Need' checkbox on any na category", expected: "Card expands to the task entry form", vehicle: "PHX-001", role: "Admin" },
          { case: "Assign a vendor to the task", expected: "Vendor name appears on the category card header", vehicle: "PHX-001", role: "Admin" },
          { case: "Buyer marks the bodyshop bid as Approved", expected: "Status badge shows Approved (blue)", vehicle: "PHX-002 · bodyshop", role: "Buyer" },
          { case: "Vendor (or admin) marks the touchup task as Started", expected: "Status badge shows In Progress (yellow/amber)", vehicle: "PHX-002 · touchup", role: "Vendor A" },
          { case: "Mark the pdr task as Complete", expected: "Status badge shows Done (green)", vehicle: "PHX-002 · pdr", role: "Admin" },
          { case: "Set a priority number (1–9) on a task — interior has priority 3 pre-set", expected: "Priority number is saved and shown correctly after page refresh", vehicle: "PHX-002 · interior", role: "Admin" },
        ]
      },
      {
        title: "5. Vendor Portal",
        tests: [
          { case: "Log in as vendor@fleettest.local (Detail Pro PHX)", expected: "Only vehicles with Detail Pro PHX tasks are visible — PHX-002 appears, DFW-001 does not", role: "Vendor A" },
          { case: "Vendor opens PHX-002", expected: "Only Detail Pro categories are interactive; others are read-only or hidden", vehicle: "PHX-002", role: "Vendor A" },
          { case: "Vendor submits a bid on the detail task (no bid yet)", expected: "Bid amount saves and is visible to admin and buyer", vehicle: "PHX-002 · detail", role: "Vendor A" },
          { case: "Verify cross-vendor isolation — DFW-001 has Phoenix Recon Group tasks only", expected: "DFW-001 is NOT visible to vendor@fleettest.local", vehicle: "DFW-001", role: "Vendor A" },
        ]
      },
      {
        title: "6. Transport Tracking",
        tests: [
          { case: "Open a vehicle → check transport section (inbound already delivered)", expected: "Inbound and outbound transport panels are visible", vehicle: "PHX-001", role: "Admin" },
          { case: "Set inbound carrier, phone, and ETA from scratch then save", expected: "Data saves and reappears correctly after page refresh", vehicle: "PHX-006", role: "Admin" },
          { case: "Mark inbound as Picked Up (inbound set, not yet delivered)", expected: "Pickup date is recorded and status updates", vehicle: "DFW-002", role: "Admin" },
          { case: "Set outbound carrier then mark as Delivered (buyer already approved ship)", expected: "Delivery date is recorded and vehicle status updates accordingly", vehicle: "PHX-003", role: "Admin" },
        ]
      },
      {
        title: "7. Condition Reports (CR)",
        tests: [
          { case: "Open a vehicle with CR already assigned — check CR section", expected: "CR section loads; cr_status=assigned, assigned to techsupport@fleettest.local", vehicle: "PHX-005", role: "TechSupp" },
          { case: "Open a fresh vehicle and assign the CR to a user via the dropdown", expected: "Assignment persists after page refresh", vehicle: "PHX-001", role: "Admin" },
          { case: "Set CR status from assigned → complete on PHX-005", expected: "Status badge updates to reflect the new state", vehicle: "PHX-005", role: "TechSupp" },
          { case: "Use a deep-link URL ?vehicle=<PHX-005 id>&cat=cr", expected: "Page opens directly to the CR section of PHX-005", vehicle: "PHX-005", role: "Any" },
        ]
      },
      {
        title: "8. Reports Page",
        tests: [
          { case: "Admin navigates to the 📊 Reports tab", expected: "Page loads without error or blank screen", role: "Admin" },
          { case: "Check report content", expected: "Summary statistics render (vehicle counts, status breakdowns, etc.)", role: "Admin" },
          { case: "Log in as a non-admin role (Buyer, Seller, Vendor)", expected: "Reports tab is not visible in the navigation", role: "Buyer" },
        ]
      },
      {
        title: "9. Payments Queue",
        tests: [
          { case: "Log in as ap@fleettest.local → check navigation", expected: "💸 Payment Queue tab is visible", role: "AP" },
          { case: "Open Payment Queue", expected: "Queue loads without error and shows pending vendor payouts", role: "AP" },
          { case: "Log in as Admin (michael.alanw@gmail.com) → check navigation", expected: "Payment Queue tab is also visible for admin", role: "Admin" },
          { case: "Log in as buyer@fleettest.local (non-AP, non-admin)", expected: "Payment Queue tab is NOT visible", role: "Buyer" },
        ]
      },
      {
        title: "10. Photo Uploads",
        tests: [
          { case: "Open a vehicle → navigate to the 📸 gallery section", expected: "Gallery section loads and is accessible", vehicle: "PHX-005", role: "Admin" },
          { case: "Upload one or more photos", expected: "Photos appear in the gallery with thumbnails immediately", vehicle: "PHX-005", role: "Admin" },
          { case: "Refresh the page", expected: "Uploaded photos persist in the gallery", vehicle: "PHX-005", role: "Admin" },
          { case: "Delete a photo", expected: "Photo is removed from the gallery", vehicle: "PHX-005", role: "Admin" },
        ]
      },
      {
        title: "11. Deep Links & Background Sync",
        tests: [
          { case: "Copy URL with ?vehicle=<PHX-001 id> and open in a new tab", expected: "Vehicle detail opens directly to PHX-001", vehicle: "PHX-001", role: "Any" },
          { case: "Copy URL with ?vehicle=<PHX-002 id>&cat=bodyshop", expected: "Page opens to the Body Shop recon tab of PHX-002", vehicle: "PHX-002", role: "Any" },
          { case: "Leave the app idle for 30 seconds (no user interaction)", expected: "Vehicle data refreshes automatically from the server in the background", role: "Any" },
          { case: "Open app in two tabs and edit a field in Tab 1", expected: "Tab 2 reflects the update via WebSocket within a few seconds (see also section 28)", vehicle: "PHX-001", role: "Any" },
        ]
      },
    ]
  },
  {
    label: "⚡ Phase Enhancements",
    sublabel: "feature/fleet-enhancements branch",
    sections: [
      {
        title: "12. Task Notes UX",
        tag: "updated",
        tests: [
          { case: "Open a vehicle in recon — bodyshop task has notes pre-seeded", expected: "Pre-seeded notes display in preview mode with the ✏️ edit icon visible", vehicle: "PHX-002 · bodyshop", role: "Admin" },
          { case: "Click ✏️ on pre-seeded notes", expected: "Editor reopens with the existing text pre-filled and focused", vehicle: "PHX-002 · bodyshop", role: "Admin" },
          { case: "Type notes and click away without pressing any button", expected: "Text saves and shows in preview mode (not an editable input)", vehicle: "PHX-002", role: "Admin" },
          { case: "Check the label next to TASK NOTES", expected: "'· saves automatically' hint is visible next to the label", vehicle: "PHX-002", role: "Admin" },
          { case: "Check Save Notes button visibility with non-empty notes", expected: "Save Notes button is visible only when notes contain text", vehicle: "PHX-002", role: "Admin" },
          { case: "Click Save Notes", expected: "Editor closes, preview shows with a brief '✓ Saved' flash", vehicle: "PHX-002", role: "Admin" },
          { case: "Type notes and press Shift + a letter to capitalize", expected: "Editor stays open — Shift key does NOT close the notes editor", vehicle: "PHX-002", role: "Admin" },
          { case: "Leave notes blank and save the task", expected: "Task saves normally — notes are not required and Save Notes is not shown", vehicle: "PHX-002", role: "Admin" },
        ]
      },
      {
        title: "13. URL Detection in Notes",
        tag: "new",
        tests: [
          { case: "Open the bodyshop task — notes already contain URLs (pre-seeded)", expected: "Each URL in the pre-seeded note is a clickable blue hyperlink in preview mode", vehicle: "PHX-002 · bodyshop", role: "Admin" },

// Flat indexed array used by all state functions
const SECTIONS = GROUPS.flatMap(g => g.sections);

const KEY      = 'fc_test_plan_v2';
const META_KEY = 'fc_test_plan_meta_v2';
const TAGS_KEY = 'fc_test_plan_tags_v2';
let state = {};
let tagState = {}; // si → overridden tag value (null clears it)
let meta = { tester: '', branch: 'feature/fleet-enhancements', date: new Date().toISOString().slice(0,10) };

const TAG_CYCLE = [null, 'new', 'updated', 'fixed'];

function loadTags() {
  try { tagState = JSON.parse(localStorage.getItem(TAGS_KEY) || '{}'); } catch { tagState = {}; }
}
function saveTags() { localStorage.setItem(TAGS_KEY, JSON.stringify(tagState)); }

function getTag(si) {
  return (si in tagState) ? tagState[si] : (SECTIONS[si].tag || null);
}

function cycleTag(si, event) {
  event.stopPropagation();
  const current = getTag(si);
  const idx = TAG_CYCLE.indexOf(current);
  const next = TAG_CYCLE[(idx + 1) % TAG_CYCLE.length];
  tagState[si] = next;
  saveTags();
  const el = document.getElementById('sectag_' + si);
  if (!el) return;
  if (next) {
    el.className = 'section-tag tag-' + next;
    el.textContent = TAG_LABELS[next] || next.toUpperCase();
  } else {
    el.className = 'section-tag tag-add';
    el.textContent = '+ TAG';
  }
}

function load() {
  try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { state = {}; }
  try { const m = JSON.parse(localStorage.getItem(META_KEY) || '{}'); meta = { ...meta, ...m }; } catch {}
}

function save() {
  localStorage.setItem(KEY, JSON.stringify(state));
  const t = new Date().toLocaleTimeString();
  document.getElementById('saved-tag').textContent = 'Auto-saved locally ' + t;
  autoSaveToFolder();
}

let _folderSaveTimer = null;
async function autoSaveToFolder() {
  if (!dirHandle) return;
  clearTimeout(_folderSaveTimer);
  _folderSaveTimer = setTimeout(async () => {
    try {
      const perm = await dirHandle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') return;
      const payload = buildPayload();
      const json = JSON.stringify(payload, null, 2);
      const fh = await dirHandle.getFileHandle(resultFilename(), { create: true });
      const w = await fh.createWritable();
      await w.write(json);
      await w.close();
      document.getElementById('saved-tag').textContent =
        '💾 Auto-saved to ' + dirHandle.name + ' at ' + new Date().toLocaleTimeString();
    } catch { /* folder unavailable — silently skip */ }
  }, 3000);
}

function saveMeta() {
  meta.tester = document.getElementById('meta-tester').value;
  meta.branch  = document.getElementById('meta-branch').value;
  meta.date    = document.getElementById('meta-date').value;
  localStorage.setItem(META_KEY, JSON.stringify(meta));
}

function loadMetaUI() {
  document.getElementById('meta-tester').value = meta.tester || '';
  document.getElementById('meta-branch').value  = meta.branch  || '';
  document.getElementById('meta-date').value    = meta.date    || '';
}

// ── IndexedDB helpers for persisting the directory handle ─────────────────
function idbOpen() {
  return new Promise((resolve, reject) => {
    const r = indexedDB.open('fc_test_plan_fs', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    r.onsuccess = e => resolve(e.target.result);
    r.onerror   = () => reject(r.error);
  });
}
async function idbPut(key, val) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(val, key);
    tx.oncomplete = resolve; tx.onerror = () => reject(tx.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readonly');
    const r  = tx.objectStore('handles').get(key);
    r.onsuccess = () => resolve(r.result); r.onerror = () => reject(r.error);
  });
}

// ── Directory handle management ────────────────────────────────────────────
let dirHandle = null;

async function pickFolder() {
  if (!window.showDirectoryPicker) {
    alert('Your browser does not support folder selection.\nUse Chrome or Edge, or use the regular download export.');
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
    dirHandle = handle;
    await idbPut('outputDir', handle);
    showFolderStrip(handle.name);
    document.getElementById('saved-tag').textContent = '📁 Output folder set to: ' + handle.name;
  } catch (e) {
    if (e.name !== 'AbortError') console.error(e);
  }
}

async function restoreFolder() {
  try {
    const handle = await idbGet('outputDir');
    if (!handle) return;
    dirHandle = handle;
    showFolderStrip(handle.name);
  } catch {}
}

function showFolderStrip(name) {
  document.getElementById('folder-name').textContent = name;
  document.getElementById('folder-strip').style.display = 'flex';
  document.getElementById('folder-btn').textContent = '📁 Change Folder';
}

// ── Build export payload ───────────────────────────────────────────────────
function buildPayload() {
  const counts = { pass: 0, fail: 0, pending: 0, resolved: 0, skip: 0, untested: 0, total: 0 };
  SECTIONS.forEach((sec, si) => sec.tests.forEach((_, ti) => {
    counts.total++;
    const s = state[itemKey(si, ti)]?.status || '';
    if      (s === 'pass')     counts.pass++;
    else if (s === 'fail')     counts.fail++;
    else if (s === 'pending')  counts.pending++;
    else if (s === 'resolved') counts.resolved++;
    else if (s === 'skip')     counts.skip++;
    else                       counts.untested++;
  }));
  return {
    _meta: {
      tester:     meta.tester  || 'Unknown',
      branch:     meta.branch  || '',
      date:       meta.date    || new Date().toISOString().slice(0, 10),
      exportedAt: new Date().toISOString(),
      summary:    counts,
    },
    results: state,
  };
}

function resultFilename() {
  const d = meta.date || new Date().toISOString().slice(0, 10);
  const t = (meta.tester || 'unknown').replace(/\s+/g, '-').toLowerCase();
  return 'test-results-' + d + '-' + t + '.json';
}

// ── Export — folder API or download fallback ───────────────────────────────
async function exportResults() {
  const payload  = buildPayload();
  const json     = JSON.stringify(payload, null, 2);
  const filename = resultFilename();

  if (dirHandle) {
    try {
      const perm = await dirHandle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        const fh  = await dirHandle.getFileHandle(filename, { create: true });
        const writable = await fh.createWritable();
        await writable.write(json);
        await writable.close();
        document.getElementById('saved-tag').textContent =
          '✓ Saved to ' + dirHandle.name + '/' + filename + ' — commit to share';
        return;
      }
    } catch (e) {
      console.warn('Folder write failed, falling back to download:', e);
    }
  }

  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  const tip = dirHandle ? '' : ' — set an output folder to auto-save';
  document.getElementById('saved-tag').textContent = '⬇ Downloaded ' + filename + tip;
}

function importResults(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      const imported = payload.results || payload;
      const m = payload._meta || {};
      if (m.tester) { meta.tester = m.tester; }
      if (m.branch) { meta.branch = m.branch; }
      if (m.date)   { meta.date   = m.date;   }
      state = imported;
      save();
      localStorage.setItem(META_KEY, JSON.stringify(meta));
      loadMetaUI();
      buildUI();
      updateProgress();
      document.getElementById('saved-tag').textContent =
        '⬆ Imported from ' + (m.tester || 'unknown') + ' · ' + (m.date || '');
    } catch {
      alert('Could not read that file — make sure it is a valid test-results.json.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function itemKey(si, ti) { return si + '_' + ti; }

function setStatus(si, ti, status) {
  const k = itemKey(si, ti);
  if (state[k]?.status === status) { state[k] = { ...state[k], status: '' }; }
  else { state[k] = { ...state[k], status }; }
  save();
  renderRow(si, ti);
  updateProgress();
  updateSectionStats(si);
}

function setNote(si, ti, val) {
  const k = itemKey(si, ti);
  state[k] = { ...state[k], note: val };
  save();
}

function toggleNote(si, ti) {
  const ta = document.getElementById('notes_' + si + '_' + ti);
  const btn = document.getElementById('notebtn_' + si + '_' + ti);
  ta.classList.toggle('visible');
  btn.classList.toggle('active');
}

function renderRow(si, ti) {
  const k = itemKey(si, ti);
  const s = state[k]?.status || '';
  const row = document.getElementById('row_' + si + '_' + ti);
  if (!row) return;
  row.className = 'test-row' + (s ? ' ' + s : '');
  ['pass','fail','skip','pending','resolved'].forEach(v => {
    const b = document.getElementById('btn_' + v + '_' + si + '_' + ti);
    if (b) b.className = 'btn btn-' + v + (s === v ? ' active' : '');
  });
}

function updateProgress() {
  let total = 0, done = 0, pending = 0, fail = 0;
  SECTIONS.forEach((sec, si) => {
    sec.tests.forEach((_, ti) => {
      total++;
      const s = state[itemKey(si, ti)]?.status;
      if (s === 'pass' || s === 'skip' || s === 'resolved') done++;
      if (s === 'fail') { done++; fail++; }
      if (s === 'pending') pending++;
    });
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  const parts = [done + ' of ' + total + ' reviewed'];
  if (fail)    parts.push(fail    + ' failing');
  if (pending) parts.push(pending + ' pending');
  document.getElementById('progress-text').textContent = parts.join(' · ');
  document.getElementById('progress-pct').textContent = pct + '%';
}

function updateSectionStats(si) {
  const sec = SECTIONS[si];
  if (!sec) return;
  let pass = 0, fail = 0, pending = 0, resolved = 0, untested = 0;
  const total = sec.tests.length;
  sec.tests.forEach((_, ti) => {
    const s = state[itemKey(si, ti)]?.status;
    if      (s === 'pass')     pass++;
    else if (s === 'fail')     fail++;
    else if (s === 'pending')  pending++;
    else if (s === 'resolved') resolved++;
    else                       untested++;
  });
  const parts = [pass + ' passed', fail + ' failed'];
  if (pending)  parts.push(pending  + ' pending');
  if (resolved) parts.push(resolved + ' resolved');
  parts.push(total + ' total');
  const el = document.getElementById('stats_' + si);
  if (el) el.textContent = parts.join(' · ');

  // Section-level completion state
  const sectionDiv = document.getElementById('section_' + si);
  if (!sectionDiv) return;
  sectionDiv.classList.remove('section-done', 'section-fail');
  const badgeEl = document.getElementById('donebadge_' + si);
  if (untested === 0 && pending === 0 && fail === 0) {
    sectionDiv.classList.add('section-done');
    if (badgeEl) { badgeEl.className = 'done-badge'; badgeEl.textContent = '✓ ALL DONE'; }
  } else if (fail > 0) {
    sectionDiv.classList.add('section-fail');
    if (badgeEl) { badgeEl.className = 'fail-badge'; badgeEl.textContent = fail + ' FAILING'; }
  } else {
    if (badgeEl) { badgeEl.className = ''; badgeEl.textContent = ''; }
  }
}

const TAG_LABELS = { new: 'NEW', updated: 'ENHANCED', fixed: 'FIXED' };

function buildUI() {
  const plan = document.getElementById('plan');
  plan.innerHTML = '';
  let si = 0;
  GROUPS.forEach(group => {
    if (group.label) {
      const gd = document.createElement('div');
      gd.className = 'group-divider';
      gd.innerHTML =
        '<div class="gd-label">' + group.label + '</div>' +
        (group.sublabel ? '<div class="gd-sub">' + group.sublabel + '</div>' : '');
      plan.appendChild(gd);
    }
    group.sections.forEach(sec => {
      const div = document.createElement('div');
      div.className = 'section';
      div.id = 'section_' + si;

      const currentTag = getTag(si);
      const tagHtml = currentTag
        ? '<span id="sectag_' + si + '" class="section-tag tag-' + currentTag + '" onclick="cycleTag(' + si + ',event)" title="Click to cycle tag">' + (TAG_LABELS[currentTag] || currentTag.toUpperCase()) + '</span>'
        : '<span id="sectag_' + si + '" class="section-tag tag-add" onclick="cycleTag(' + si + ',event)" title="Click to add a tag">+ TAG</span>';

      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.innerHTML =
        '<span class="section-title">' + sec.title + '</span>' +
        tagHtml +
        '<span id="donebadge_' + si + '"></span>' +
        '<span class="section-stats" id="stats_' + si + '"></span>' +
        '<span class="section-chevron">▼</span>';
      const _si = si;
      hdr.onclick = () => { div.classList.toggle('collapsed'); };
      div.appendChild(hdr);

      const tests = document.createElement('div');
      tests.className = 'tests';

      const prevCount = SECTIONS.slice(0, si).reduce((a, s) => a + s.tests.length, 0);
      sec.tests.forEach((t, ti) => {
        const k = itemKey(_si, ti);
        const note = state[k]?.note || '';
        const row = document.createElement('div');
        row.className = 'test-row';
        row.id = 'row_' + _si + '_' + ti;

        row.innerHTML =
          '<div class="test-num">' + (prevCount + ti + 1) + '</div>' +
          '<div class="test-body">' +
            '<div class="test-case">' + roleChip(t.role) + (t.vehicle ? '<span class="veh-chip" title="Seed data: ' + t.vehicle + '">' + t.vehicle + '</span>' : '') + t.case + '</div>' +
            '<div class="test-expected"><span class="exp-label">Expected</span>' + t.expected + '</div>' +
            '<textarea id="notes_' + _si + '_' + ti + '" class="test-notes' + (note ? ' visible' : '') + '" rows="2" placeholder="Add notes…" oninput="setNote(' + _si + ',' + ti + ',this.value)">' + (note || '') + '</textarea>' +
          '</div>' +
          '<div class="actions">' +
            '<div class="btn-group">' +
              '<button id="btn_pass_' + _si + '_' + ti + '" class="btn btn-pass" onclick="setStatus(' + _si + ',' + ti + ',\'pass\')">✓ Pass</button>' +
              '<button id="btn_fail_' + _si + '_' + ti + '" class="btn btn-fail" onclick="setStatus(' + _si + ',' + ti + ',\'fail\')">✕ Fail</button>' +
              '<button id="btn_pending_' + _si + '_' + ti + '" class="btn btn-pending" onclick="setStatus(' + _si + ',' + ti + ',\'pending\')" title="Issue found — fix in progress">⏳ Pending</button>' +
              '<button id="btn_resolved_' + _si + '_' + ti + '" class="btn btn-resolved" onclick="setStatus(' + _si + ',' + ti + ',\'resolved\')" title="Was failing — now fixed and re-verified">✔ Resolved</button>' +
              '<button id="btn_skip_' + _si + '_' + ti + '" class="btn btn-skip" onclick="setStatus(' + _si + ',' + ti + ',\'skip\')">— Skip</button>' +
            '</div>' +
            '<button id="notebtn_' + _si + '_' + ti + '" class="btn btn-note' + (note ? ' active' : '') + '" onclick="toggleNote(' + _si + ',' + ti + ')">📝 Note</button>' +
          '</div>';

        tests.appendChild(row);
      });

      div.appendChild(tests);
      plan.appendChild(div);

      sec.tests.forEach((_, ti) => renderRow(si, ti));
      updateSectionStats(si);
      si++;
    });
  });
}

function expandAll()  { document.querySelectorAll('.section').forEach(s => s.classList.remove('collapsed')); }
function collapseAll(){ document.querySelectorAll('.section').forEach(s => s.classList.add('collapsed')); }
function resetAll() {
  if (!confirm('Reset all test results? This cannot be undone.')) return;
  state = {};
  save();
  buildUI();
  updateProgress();
}

load();
loadTags();
buildUI();
updateProgress();
loadMetaUI();
restoreFolder();
</script>
